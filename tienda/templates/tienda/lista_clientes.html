{% extends "tienda/base.html" %}

{% block title %}Clientes{% endblock %}

{% block content %}
    <h1>Clientes</h1>

    <a href="{% url 'tienda:crear_cliente' %}" class="btn primary">Nuevo cliente</a>

    <ul>
        {% for c in clientes %}
            <li>
                <a href="{% url 'tienda:detalle_cliente' c.id %}">
                    {{ c.nombre }}
            </li>
        {% empty %}
            <li>No hay clientes registrados.</li>
        {% endfor %}
    </ul>
{% endblock %}
